name: chiglow
description: ChiGlow - Feng Shui your life. Glow from your space out.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1
  sensors_plus: ^4.0.2
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  flutter_compass: ^0.7.0
  vector_math: ^2.1.4
  purchases_flutter: ^6.29.0
  purchases_ui_flutter: ^6.29.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#D32F2F"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/