name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'

      - name: 🔢 Extract version
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APK version: $VERSION"

      - name: 📝 Generate release notes
        id: notes
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Get commit messages since last tag, or last 10 commits
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s" --no-merges)
            else
              NOTES=$(git log --oneline -10 --pretty=format:"- %s" --no-merges)
            fi
            echo "NOTES<<EOF" >> $GITHUB_ENV
            echo "$NOTES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: 📥 Install dependencies
        run: flutter pub get

      - name: 🔨 Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: 🏷️ Rename APKs with version
        run: |
          VERSION="${{ env.VERSION }}"
          # ARM64
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             "build/app/outputs/flutter-apk/ChiGlow-${VERSION}-ARM64.apk"
          # ARM32
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             "build/app/outputs/flutter-apk/ChiGlow-${VERSION}-ARM32.apk"
          # x86_64
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
             "build/app/outputs/flutter-apk/ChiGlow-${VERSION}-x86_64.apk"

      - name: 📤 Upload APK (ARM64)
        uses: actions/upload-artifact@v4
        with:
          name: ChiGlow-${{ env.VERSION }}-ARM64
          path: build/app/outputs/flutter-apk/ChiGlow-${{ env.VERSION }}-ARM64.apk

      - name: 📤 Upload APK (ARM32)
        uses: actions/upload-artifact@v4
        with:
          name: ChiGlow-${{ env.VERSION }}-ARM32
          path: build/app/outputs/flutter-apk/ChiGlow-${{ env.VERSION }}-ARM32.apk

      - name: 📤 Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: ChiGlow-${{ env.VERSION }}-x86_64
          path: build/app/outputs/flutter-apk/ChiGlow-${{ env.VERSION }}-x86_64.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate release notes from commits
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --oneline -20 --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 📥 Download all APKs
        uses: actions/download-artifact@v4

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ChiGlow ${{ github.ref_name }}
          body: |
            ## 🪷 ChiGlow ${{ github.ref_name }}

            ### What's New ✨
            ${{ env.CHANGES }}

            ### 📱 Download
            | Device | File |
            |--------|------|
            | Most modern phones | `ChiGlow-${{ github.ref_name }}-ARM64.apk` |
            | Older phones | `ChiGlow-${{ github.ref_name }}-ARM32.apk` |
            | Emulators / Tablets | `ChiGlow-${{ github.ref_name }}-x86_64.apk` |

            *Illuminate Your Chi. Glow Every Day.* 🌸
          files: |
            ChiGlow-*/ChiGlow-*.apk